<!DOCTYPE html>
<html>
<body>

<input type="text" id="email" placeholder="Enter Email">
<button onclick="validateEmail()">Validate</button>

<p id="result"></p>

<script>
async function validateEmail() {
    let email = document.getElementById("email").value;

    try {
        let response = await fetch("https://jsonplaceholder.typicode.com/users");
        let data = await response.json();

        let exists = data.some(user => user.email === email);

        if (exists) {
            document.getElementById("result").innerHTML = "Email already exists ❌";
        } else {
            document.getElementById("result").innerHTML = "Email is valid ✅";
        }
    } catch (error) {
        document.getElementById("result").innerHTML = "Error checking email";
    }
}
</script>

</body>
</html>
