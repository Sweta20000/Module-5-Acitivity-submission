<!DOCTYPE html>
<html>
<body>
<script>
    let greeting = "Hello, World!";
    document.write(greeting + "<br>");
    let num1 = 42;
    let num2 = 3.14;
    document.write("Integer: " + num1 + ", Float: " + num2 + "<br>");
    let isTrue = true;
    document.write("Boolean value: " + isTrue + "<br>");
    let notAssigned;
    document.write("Undefined value: " + notAssigned + "<br>");
    let emptyValue = null;
    document.write("Null value: " + emptyValue + "<br>");
    let colors = ["Red", "Green", "Blue"];
    document.write("Array object: " + colors + "<br>"); 
    document.write("<h2>This is an H2 heading</h2>"); 
</script>
</body>
</html>
