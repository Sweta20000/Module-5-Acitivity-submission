<!DOCTYPE html>
<html>
<body>

<form onsubmit="return validateForm()">
    Name: <input type="text" id="name"><br><br>
    <input type="submit" value="Submit">
</form>

<script>
function validateForm() {
    let name = document.getElementById("name").value;

    if (name === "") {
        document.write("Name cannot be empty ");
        return false;
    }
    return true;
}
</script>

</body>
</html>
