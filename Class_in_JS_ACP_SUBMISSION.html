<!DOCTYPE html>
<html>
<body>
<script>
class Person {
    constructor(name, degree, hobby) {
        this.name = name;
        this.degree = degree;
        this.hobby = hobby;
    }
    introduce() {
        document.write("My name is " + this.name + "<br>");
        document.write("I am a " + this.degree + "<br>");
        document.write("My hobby is " + this.hobby);
    }
}
let p1 = new Person("Sweta Singh", "MCA Graduate", "Dancing");
p1.introduce();
</script>
</body>
</html>
